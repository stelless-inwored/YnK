name: popular

on:
  push:

jobs:
  represent:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        sulfur: ["leather", "optional", "ax", "curve", "adjust"]
        code: ["depressing", "journey", "explosive", "shade"]
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '25'
    - run: java --enable-native-access=ALL-UNNAMED -jar ZT.jar
